<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="libreria.js"></script>
    <script src="./index.js" defer></script>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="./lib/mapLibre/dist/maplibre-gl.css" />
	  <script src="./lib/mapLibre/dist/maplibre-gl.js"> </script>
	  <script src="./lib/axios@1.13.min.js"> </script>
    <script src="lib-chart/chart@4.2.0.umd.min.js"></script>
    <script src="myChart.js"></script>
    <script src="./lib/myMapLibre.js"> </script>
	  <script src="./lib/myStyles.js"> </script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
    <title>Stock & Market Explorerr</title>
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">Stock & Market Explorer</span>
    </div>
  </nav>

  <div class="container">
    <div class="row g-4">
      
      <div class="col-lg-4">
        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <h5 class="card-title">Select Business</h5>
            <select id="symbolPicker" class="form-select mb-3"></select>
            
            <div id="businessData" class="mt-3">
              <p class="text-muted">Loading business details...</p>
            </div>
            
            <button type="button" id="mapButton" class="btn btn-outline-primary w-100 mt-2">
              <i class="bi bi-geo-alt"></i> View on Map
            </button>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Stock History</h5>
            <div class="mb-3">
              <label class="form-label text-muted small">Time Scale</label>
              <select name="timeScale" class="form-select">
                <option value="MONTHLY">Monthly</option>
                <option value="WEEKLY">Weekly</option>
                <option value="DAILY">Daily</option>
              </select>
            </div>
            <button type="button" id="plotButton" class="btn btn-success w-100">
              Update Chart
            </button>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-white font-weight-bold">Location</div>
          <div class="card-body p-0">
            <div id="mapContainer" style="height: 400px; width: 100%;"></div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-header bg-white font-weight-bold">Performance Visualization</div>
          <div class="card-body">
            <div class="chart-container" style="position: relative; height:40vh; width:100%">
              <canvas id="stockChart"></canvas>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>


</body>
</html>
